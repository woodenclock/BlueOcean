# MAPF / VDA5050 demo stack (real physical robots, ARTC layout)
#
# Config: .env at repo root (copy from .env.sample). Selects ports and the active
#   map floor via VDA5050_MAP_ID (AMAV-X | l1-artc).
# Compose project name: rmf2_demo_gametl.
#
#   # robot REST hosts live in maps/<VDA5050_MAP_ID>/robots.yaml (`endpoint` per
#   # robot), served via the master /robots
#   docker compose up --build
#   curl -X POST 'http://localhost:8089/demo/blue-ocean'
#
#   VDA5050 only — master + real adapters, no scheduler/planner:
#     docker compose up --build mqtt-broker vda5050 autoxing-1 reeman-2-blue
#     Master API: http://localhost:8000/docs
#
#   rebuild adapters only (stack must already be up):
#     docker compose up --build --no-deps autoxing-1 reeman-2-blue
#
# See docs/real-demo-node-coords.md for the real-world topology.

name: rmf2_demo_gametl

services:

  mqtt-broker:
    image: eclipse-mosquitto:2
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "${MQTT_PORT:-1883}:${MQTT_PORT:-1883}"
    networks:
      - rmf2-net
    healthcheck:
      test:
        ["CMD-SHELL", "mosquitto_pub -p ${MQTT_PORT:-1883} -t healthcheck -m ping || exit 1"]
      # interval: 10s
      timeout: 5s
      retries: 10

  amqp-broker:
    image: rabbitmq:3-management
    ports:
      - "${AMQP_PORT:-5672}:${AMQP_PORT:-5672}"
      - "${AMQP_MGMT_PORT:-15672}:${AMQP_MGMT_PORT:-15672}"
    networks:
      - rmf2-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  scheduler:
    build:
      context: src/rmf2_scheduler_gametl
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-ubuntu:24.04}
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
    image: ${SCHEDULER_IMAGE:-rmf2_scheduler:3.12-noble}
    command: ["blue_ocean_scheduler", "--host", "0.0.0.0", "--port", "${SCHEDULER_PORT:-8089}"]
    ports:
      - "${SCHEDULER_PORT:-8089}:${SCHEDULER_PORT:-8089}"
    environment:
      SCHEDULER_PORT: ${SCHEDULER_PORT:-8089}
      LD_BROKER_URL: ${LD_BROKER_URL:-}
      AMQP_HOST: ${AMQP_HOST:-amqp-broker}
      AMQP_PORT: ${AMQP_PORT:-5672}
      # VDA5050 master, used by the live /demo/blue-ocean path to read robot
      # poses (/state) and the topology map (/map).
      MASTER_URL: http://vda5050:${VDA5050_PORT:-8000}
      VDA5050_MAP_ID: ${VDA5050_MAP_ID:-AMAV-X}
      # /demo/direct-navigate — spellbook REST bypass (no MAPF/VDA5050). Each
      # robot's REST host now comes from its `endpoint` in maps/robots.yaml,
      # served via the master /robots — so no per-robot IP env is needed here.
      DIRECT_NAV_WAIT_TIMEOUT_S: ${DIRECT_NAV_WAIT_TIMEOUT_S:-300}
      # /demo/pick-rack imports autoxing/autoxing_bridge/spellbook/pick_rack.py directly.
      VDA_DEMO_ROOT: /vda_demo
      AUTOXING_SPELLBOOK_DIR: /vda_demo/autoxing/autoxing_bridge/spellbook
    volumes:
      - scheduler-data:/root/.cache/r2ts-backups
      - ./src/vda5050_core_gametl/vda5050_core_py/demo-june-blue-ocean:/vda_demo:ro
    restart: unless-stopped
    networks:
      - rmf2-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.environ[\\\"SCHEDULER_PORT\\\"]}/docs')\"",
        ]
      interval: 1m
      timeout: 5s
      retries: 5
      start_period: 15s

  task-orchestrator:
    build:
      context: .
      dockerfile: docker/task-orchestrator.Dockerfile
    ports:
      - "${TASK_ORCHESTRATOR_PORT:-2727}:${TASK_ORCHESTRATOR_PORT:-2727}"
    environment:
      TASK_ORCHESTRATOR__HTTP__PORT: ${TASK_ORCHESTRATOR_PORT:-2727}
      TASK_ORCHESTRATOR__AMQP__PORT: ${AMQP_PORT:-5672}
      TASK_ORCHESTRATOR__MQTT__PORT: ${MQTT_PORT:-1883}
      # Default filter only enables the rmf2_task_orchestrator crate, hiding
      # the AMQP consumer / workflow logs that prove schedules were received.
      RUST_LOG: ${RUST_LOG:-info,rmf2_task_orchestrator=debug,workflow_executor=debug,amqp=debug}
    depends_on:
      amqp-broker:
        condition: service_healthy
      mqtt-broker:
        condition: service_healthy
    networks:
      - rmf2-net
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:${TASK_ORCHESTRATOR_PORT:-2727}/health_check || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Real MAPF planning stack (no ROS): consumes amr_mapf TaskRequests from
  # AMQP, plans with MAPFCoordinator + CBS + PlanGenerator on the LIF map
  # graph (departure_blockers included), POSTs each robot's plan (coords +
  # departure blockers) to the VDA5050 master REST API (/plans/mapf) and sends
  # TaskStatus back to AMQP. The master stores plans. Map unification: the
  # reeman adapter calibrates a Reeman->AutoXing transform at init (see
  # demo-june-blue-ocean/map_transform/); AutoXing's frame is the master frame.
  mapf-planner:
    build:
      context: .
      dockerfile: docker/mapf-planner.Dockerfile
    # depends_on vda5050: the planner fetches its topology + robot profiles from
    # the master at startup (/map/grid, /robots). The master is the single map
    # authority; MAP_FILE/ROBOTS_FILE in the image are offline fallbacks only.
    depends_on:
      amqp-broker:
        condition: service_healthy
      vda5050:
        condition: service_healthy
    networks:
      - rmf2-net
    environment:
      AMQP_HOST: amqp-broker
      AMQP_PORT: ${AMQP_PORT:-5672}
      MASTER_URL: http://vda5050:${VDA5050_PORT:-8000}
    restart: unless-stopped
    # Headless AMQP worker (no exposed port): liveness == the service process runs.
    healthcheck:
      test:
        ["CMD-SHELL", "pgrep -f blue_ocean_planner_service >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # VDA5050 master: the single map/transform/robots authority. Validates and
  # dispatches against the real-world coordinate map of the selected floor. The
  # master map frame is that floor's AutoXing onboard map = VDA5050_MAP_ID = the
  # floor dir name (AMAV-X | l1-artc). Real coords live in
  # maps/<VDA5050_MAP_ID>/real.layout.lif.json — see docs/real-demo-node-coords.md.
  vda5050:
    build:
      context: .
      dockerfile: docker/vda5050.Dockerfile
    command:
      ["uv", "run", "python", "example_master_webserver.py", "--disable-state-log"]
    ports:
      - "${VDA5050_PORT:-8000}:${VDA5050_PORT:-8000}"
    depends_on:
      mqtt-broker:
        condition: service_healthy
    networks:
      - rmf2-net
    # Mount the whole canonical maps/ tree and serve the floor selected by
    # VDA5050_MAP_ID over /map, /map/grid, /transform, /robots. VDA5050_MAP_ID is
    # both the master map id AND the floor dir name — switch floors with that one
    # knob (AMAV-X default; l1-artc for the ARTC floor).
    volumes:
      - ./maps:/app/maps:ro
    environment:
      VDA5050_PORT: ${VDA5050_PORT:-8000}
      MQTT_BROKER: tcp://mqtt-broker:${MQTT_PORT:-1883}
      PYTHONUNBUFFERED: "1"
      # Master-frame map id = the selected floor's AutoXing onboard map name,
      # which is also the floor dir name (AMAV-X or l1-artc). Set in .env.
      VDA5050_MAP_ID: ${VDA5050_MAP_ID:-AMAV-X}
      MASTER_MAP_FILE: /app/maps/${VDA5050_MAP_ID:-AMAV-X}/real.layout.lif.json
      MASTER_ROBOTS_FILE: /app/maps/${VDA5050_MAP_ID:-AMAV-X}/robots.yaml
      MAP_TF_FILE: /app/maps/${VDA5050_MAP_ID:-AMAV-X}/map_transforms.yaml
      # Master-frame occupancy map served to the UI (/map/image + /map/image/meta).
      # The real layout coords share this AutoXing image's frame, so the
      # visualiser drapes it behind the nodes. master.image.png shares
      # master.image.yaml's resolution/origin.
      MASTER_MAP_IMAGE_FILE: /app/maps/${VDA5050_MAP_ID:-AMAV-X}/master.image.png
      MASTER_MAP_IMAGE_META: /app/maps/${VDA5050_MAP_ID:-AMAV-X}/master.image.yaml
      # Back-channel to the MAPF planner: master emits TaskComplete on order
      # completion so the planner drops the finished task from its batch.
      AMQP_HOST: ${AMQP_HOST:-amqp-broker}
      AMQP_PORT: ${AMQP_PORT:-5672}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.environ[\\\"VDA5050_PORT\\\"]}/map')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # VDA5050 adapters: one per robot_id (service name == robot_id). ROBOT_ID +
  # MASTER_URL are the only inputs; the adapter resolves identity/map/transform
  # from the master (GET /robots, /transform) at startup — no per-robot config
  # or transform files mounted.
  autoxing-1:
    build:
      context: .
      dockerfile: docker/vda5050.Dockerfile
    entrypoint: ["/bin/bash", "-lc"]
    working_dir: /vda_ws/src/vda5050_core_gametl/vda5050_core_py/demo-june-blue-ocean
    command:
      - |
        source /opt/ros/jazzy/setup.bash
        source /vda_ws/install/setup.bash
        uv sync
        uv run python3 example_autoxing_adapter_client.py --disable-state-log
    depends_on:
      mqtt-broker:
        condition: service_healthy
      vda5050:
        condition: service_healthy
    networks:
      - rmf2-net
    environment:
      PYTHONUNBUFFERED: "1"
      # ROBOT_ID + MASTER_URL are the ONLY identity/config inputs; the adapter
      # resolves manufacturer/serial/endpoint/map/transform from the master.
      ROBOT_ID: autoxing-1
      MQTT_BROKER: tcp://mqtt-broker:${MQTT_PORT:-1883}
      MASTER_URL: http://vda5050:${VDA5050_PORT:-8000}
    restart: unless-stopped
    # Headless adapter (no exposed port): liveness == the client process runs.
    # start_period covers the slow first boot (uv sync + ROS source).
    healthcheck:
      test:
        ["CMD-SHELL", "pgrep -f example_autoxing_adapter_client >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  reeman-2-blue:
    build:
      context: .
      dockerfile: docker/vda5050.Dockerfile
    entrypoint: ["/bin/bash", "-lc"]
    working_dir: /vda_ws/src/vda5050_core_gametl/vda5050_core_py/demo-june-blue-ocean
    command:
      - |
        source /opt/ros/jazzy/setup.bash
        source /vda_ws/install/setup.bash
        uv sync
        uv run python3 example_reeman_adapter_client.py --disable-state-log
    depends_on:
      mqtt-broker:
        condition: service_started
      vda5050:
        condition: service_healthy
    networks:
      - rmf2-net
    environment:
      PYTHONUNBUFFERED: "1"
      # ROBOT_ID + MASTER_URL are the ONLY identity/config inputs; the adapter
      # resolves manufacturer/serial/endpoint/map/transform from the master.
      ROBOT_ID: reeman-2-blue
      MQTT_BROKER: tcp://mqtt-broker:${MQTT_PORT:-1883}
      MASTER_URL: http://vda5050:${VDA5050_PORT:-8000}
    restart: unless-stopped

  # reeman-1:
  #   build:
  #     context: .
  #     dockerfile: docker/vda5050.Dockerfile
  #   entrypoint: ["/bin/bash", "-lc"]
  #   working_dir: /vda_ws/src/vda5050_core_gametl/vda5050_core_py/demo-june-blue-ocean
  #   command:
