# MAPF / VDA5050 demo stack
#
# Config: config/config.env (symlinked as .env).
# Compose project name: rmf2_demo_gametl (same for all profiles; profile selects services).
#
# Profiles (mutually exclusive robot/planner/master services):
#
#   dry-run (default) — simulated adapters, grid map
#     docker compose up --build
#     curl -X POST 'http://localhost:8089/demo/blue-ocean?dry_run=true'
#
#   real-demo — physical robots, ARTC layout (see docs/real-demo-node-coords.md)
#     # robot REST hosts live in maps/robots.yaml (`endpoint` per robot), served via the master /robots
#     docker compose --profile real-demo up --build
#     curl -X POST 'http://localhost:8089/demo/blue-ocean?dry_run=false'
#
#   real-demo (VDA5050 only) — master + real adapters, no scheduler/planner
#     docker compose --profile real-demo up --build mqtt-broker vda5050-real autoxing-1-real reeman-1-real
#     Master API: http://localhost:8000/docs
#
#   rebuild adapters only (real) — skips vda5050-real; stack must already be up
#     docker compose --profile real-demo up --build --no-deps autoxing-1-real reeman-1-real
#
#   rebuild adapters only (dry-run)
#     docker compose up --build --no-deps autoxing-1 reeman-1

name: rmf2_demo_gametl

services:

  mqtt-broker:
    image: eclipse-mosquitto:2
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "${MQTT_PORT:-1883}:${MQTT_PORT:-1883}"
    networks:
      - rmf2-net

  amqp-broker:
    image: rabbitmq:3-management
    ports:
      - "${AMQP_PORT:-5672}:${AMQP_PORT:-5672}"
      - "${AMQP_MGMT_PORT:-15672}:${AMQP_MGMT_PORT:-15672}"
    networks:
      - rmf2-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  scheduler:
    build:
      context: src/rmf2_scheduler_gametl
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-ubuntu:24.04}
        PYTHON_VERSION: ${PYTHON_VERSION:-3.12}
    image: ${SCHEDULER_IMAGE:-rmf2_scheduler:3.12-noble}
    command: ["blue_ocean_scheduler", "--host", "0.0.0.0", "--port", "${SCHEDULER_PORT:-8089}"]
    ports:
      - "${SCHEDULER_PORT:-8089}:${SCHEDULER_PORT:-8089}"
    environment:
      SCHEDULER_PORT: ${SCHEDULER_PORT:-8089}
      LD_BROKER_URL: ${LD_BROKER_URL:-}
      AMQP_HOST: ${AMQP_HOST:-amqp-broker}
      AMQP_PORT: ${AMQP_PORT:-5672}
      # VDA5050 master, used by the live (dry_run=false) /demo/blue-ocean
      # path to read robot poses (/state) and the topology map (/map).
      MASTER_URL: http://vda5050:${VDA5050_PORT:-8000}
      # /demo/direct-navigate — spellbook REST bypass (no MAPF/VDA5050). Each
      # robot's REST host now comes from its `endpoint` in maps/robots.yaml,
      # served via the master /robots — so no per-robot IP env is needed here.
      DIRECT_NAV_WAIT_TIMEOUT_S: ${DIRECT_NAV_WAIT_TIMEOUT_S:-300}
      # /demo/pick-rack imports autoxing_bridge/spellbook/pick_rack.py directly.
      VDA_DEMO_ROOT: /vda_demo
      AUTOXING_SPELLBOOK_DIR: /vda_demo/autoxing_bridge/spellbook
    volumes:
      - scheduler-data:/root/.cache/r2ts-backups
      - ./src/vda5050_core_gametl/vda5050_core_py/demo-june-blue-ocean:/vda_demo:ro
    restart: unless-stopped
    networks:
      - rmf2-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.environ[\\\"SCHEDULER_PORT\\\"]}/docs')\"",
        ]
      interval: 1m
      timeout: 5s
      retries: 5
      start_period: 15s

  task-orchestrator:
    build:
      context: .
      dockerfile: docker/task-orchestrator.Dockerfile
    ports:
      - "${TASK_ORCHESTRATOR_PORT:-2727}:${TASK_ORCHESTRATOR_PORT:-2727}"
    environment:
      TASK_ORCHESTRATOR__HTTP__PORT: ${TASK_ORCHESTRATOR_PORT:-2727}
      TASK_ORCHESTRATOR__AMQP__PORT: ${AMQP_PORT:-5672}
      TASK_ORCHESTRATOR__MQTT__PORT: ${MQTT_PORT:-1883}
      # Default filter only enables the rmf2_task_orchestrator crate, hiding
      # the AMQP consumer / workflow logs that prove schedules were received.
      RUST_LOG: ${RUST_LOG:-info,rmf2_task_orchestrator=debug,workflow_executor=debug,amqp=debug}
    depends_on:
      amqp-broker:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
    networks:
      - rmf2-net

  # Real MAPF planning stack (no ROS): consumes amr_mapf TaskRequests from
  # AMQP, plans with MAPFCoordinator + CBS + PlanGenerator on the LIF map
  # graph (departure_blockers included), POSTs each robot's plan (coords +
  # departure blockers) to the VDA5050 master REST API (/plans/mapf) and sends
  # TaskStatus back to AMQP. The master stores plans. Map unification: the
  # reeman adapter calibrates a Reeman->AutoXing transform at init (see
  # demo-june-blue-ocean/map_transform/); AutoXing's frame is the master frame.
  mapf-planner: &mapf-planner
    profiles: ["dry-run"]
    build:
      context: .
      dockerfile: docker/mapf-planner.Dockerfile
    # depends_on vda5050: the planner now fetches its topology + robot profiles
    # from the master at startup (/map/grid, /robots). The master is the single
    # map authority; MAP_FILE/ROBOTS_FILE below are offline fallbacks only.
    depends_on:
      amqp-broker:
        condition: service_healthy
      vda5050:
        condition: service_healthy
    networks:
      - rmf2-net
    environment: &mapf-planner-env
      AMQP_HOST: amqp-broker
      AMQP_PORT: ${AMQP_PORT:-5672}
      MASTER_URL: http://vda5050:${VDA5050_PORT:-8000}
    restart: unless-stopped

  # Real-demo planner: same image. Dry-run vs real topology is decided by WHICH
  # master it reaches (both via the "vda5050" alias) — vda5050-real serves the
  # ARTC layout with DEMO_MODE=real — so no map env is needed here.
  mapf-planner-real:
    <<: *mapf-planner
    profiles: ["real-demo"]
    depends_on:
      amqp-broker:
        condition: service_healthy
      vda5050-real:
        condition: service_healthy

  # Dry-run VDA5050 adapters: one per robot_id (autoxing-1, reeman-1).
  # Service name == robot_id. ROBOT_ID + MASTER_URL are the only inputs; the
  # adapter resolves identity/map/transform from the master (GET /robots,
  # /transform) at startup — no per-robot config or transform files mounted.
  autoxing-1:
    profiles: ["dry-run"]
    build:
      context: .
      dockerfile: docker/vda5050.Dockerfile
    entrypoint: ["/bin/bash", "-lc"]
    working_dir: /vda_ws/src/vda5050_core_gametl/vda5050_core_py/demo-june-blue-ocean
    command:
      - |
        source /opt/ros/jazzy/setup.bash
        source /vda_ws/install/setup.bash
        uv sync
        uv run python3 example_autoxing_adapter_client.py --dry-run
    depends_on:
      mqtt-broker:
        condition: service_started
      vda5050:
        condition: service_healthy
    networks:
      - rmf2-net
    environment:
      PYTHONUNBUFFERED: "1"
      # ROBOT_ID + MASTER_URL are the ONLY identity/config inputs; the adapter
      # resolves manufacturer/serial/endpoint/map/transform from the master.
      ROBOT_ID: autoxing-1
      MQTT_BROKER: tcp://mqtt-broker:${MQTT_PORT:-1883}
      MASTER_URL: http://vda5050:${VDA5050_PORT:-8000}
      DRY_RUN_STEP_SECONDS: ${DRY_RUN_STEP_SECONDS:-2}
    restart: unless-stopped

  reeman-1:
    profiles: ["dry-run"]
    build:
      context: .
      dockerfile: docker/vda5050.Dockerfile
    entrypoint: ["/bin/bash", "-lc"]
    working_dir: /vda_ws/src/vda5050_core_gametl/vda5050_core_py/demo-june-blue-ocean
    command:
      - |
        source /opt/ros/jazzy/setup.bash
        source /vda_ws/install/setup.bash
        uv sync
        uv run python3 example_reeman_adapter_client.py --dry-run
    depends_on:
      mqtt-broker:
        condition: service_started
      vda5050:
        condition: service_healthy
    networks:
      - rmf2-net
    environment:
      PYTHONUNBUFFERED: "1"
      # ROBOT_ID + MASTER_URL are the ONLY identity/config inputs; the adapter
      # resolves manufacturer/serial/endpoint/map/transform from the master.
      ROBOT_ID: reeman-1
      MQTT_BROKER: tcp://mqtt-broker:${MQTT_PORT:-1883}
      MASTER_URL: http://vda5050:${VDA5050_PORT:-8000}
      DRY_RUN_STEP_SECONDS: ${DRY_RUN_STEP_SECONDS:-2}
    restart: unless-stopped

  # reeman-2-blue:
  #   profiles: ["dry-run"]
  #   build:
  #     context: .
  #     dockerfile: docker/vda5050.Dockerfile
  #   entrypoint: ["/bin/bash", "-lc"]
  #   working_dir: /vda_ws/src/vda5050_core_gametl/vda5050_core_py/demo-june-blue-ocean
  #   command:
  #     - |
  #       source /opt/ros/jazzy/setup.bash
  #       source /vda_ws/install/setup.bash
  #       uv sync
  #       uv run python3 example_reeman_adapter_client.py --dry-run
  #   depends_on:
  #     mqtt-broker:
  #       condition: service_started
  #     vda5050:
  #       condition: service_healthy
  #   networks:
  #     - rmf2-net
  #   environment:
  #     PYTHONUNBUFFERED: "1"
  #     # ROBOT_ID + MASTER_URL are the ONLY identity/config inputs; the adapter
  #     # resolves manufacturer/serial/endpoint/map/transform from the master.
  #     ROBOT_ID: reeman-2-blue
  #     MQTT_BROKER: tcp://mqtt-broker:${MQTT_PORT:-1883}
  #     MASTER_URL: http://vda5050:${VDA5050_PORT:-8000}
  #     DRY_RUN_STEP_SECONDS: ${DRY_RUN_STEP_SECONDS:-2}
  #   restart: unless-stopped

  vda5050: &vda5050-master
    profiles: ["dry-run"]
    build:
      context: .
      dockerfile: docker/vda5050.Dockerfile
    ports:
      - "${VDA5050_PORT:-8000}:${VDA5050_PORT:-8000}"
    depends_on:
      mqtt-broker:
        condition: service_started
    networks:
      - rmf2-net
    # The master is the single map/transform/robots authority: mount the
    # canonical maps/ dir and serve it over /map, /map/grid, /transform, /robots.
    volumes:
      - ./maps:/app/maps:ro
    environment: &vda5050-master-env
      VDA5050_PORT: ${VDA5050_PORT:-8000}
      MQTT_BROKER: tcp://mqtt-broker:${MQTT_PORT:-1883}
      PYTHONUNBUFFERED: "1"
      # Canonical files served by the master (dry-run defaults; overridden in
      # vda5050-real). DEMO_MODE selects which routes slice /map/grid + /robots
      # surface for robot starts/home.
      MASTER_MAP_FILE: /app/maps/gametl_demo.layout.yaml
      MASTER_ROBOTS_FILE: /app/maps/robots.yaml
      MAP_TF_FILE: /app/maps/map_transforms.yaml
      DEMO_MODE: dry_run
      # Back-channel to the MAPF planner: master emits TaskComplete on order
      # completion so the planner drops the finished task from its batch.
      AMQP_HOST: ${AMQP_HOST:-amqp-broker}
      AMQP_PORT: ${AMQP_PORT:-5672}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python3 -c \"import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.environ[\\\"VDA5050_PORT\\\"]}/map')\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ===== Real physical demo (--profile real-demo) =====
  # Same master, but validating/dispatching against the real-world coordinate
  # map (AutoXing "From Mapping 40" frame = master map frame). Real coords live
  # in maps/gametl_demo_real.layout.yaml — see docs/real-demo-node-coords.md.
  vda5050-real:
    <<: *vda5050-master
    profiles: ["real-demo"]
    command:
      ["uv", "run", "python", "example_master_webserver.py", "--disable-state-log"]
    environment:
      <<: *vda5050-master-env
      VDA5050_MAP_ID: ${VDA5050_MAP_ID:-From Mapping 40}
      DEMO_MODE: real
      # Master-frame occupancy map served to the UI (/map/image + /map/image/meta).
      # The real layout coords share this AutoXing image's frame, so the
      # visualiser drapes it behind the nodes. clean4ui PNG shares the autoxing_map
      # yaml's resolution/origin. Unset in dry-run (synthetic grid won't align).
      MASTER_MAP_FILE: /app/maps/gametl_demo_real.layout.yaml
      MASTER_MAP_IMAGE_FILE: /app/maps/autoxing_map_1095x1045-clean4ui.png
      MASTER_MAP_IMAGE_META: /app/maps/autoxing-1_map/autoxing_map_1095x1045.yaml
    networks:
      rmf2-net:
        # Other services reach the master as "vda5050" in both profiles.
        aliases: [vda5050]

  # Real adapters (profile real-demo): same robot_id service names as dry-run.
  autoxing-1-real:
    profiles: ["real-demo"]
    hostname: autoxing-1
    build:
      context: .
      dockerfile: docker/vda5050.Dockerfile
    entrypoint: ["/bin/bash", "-lc"]
    working_dir: /vda_ws/src/vda5050_core_gametl/vda5050_core_py/demo-june-blue-ocean
    command:
      - |
        source /opt/ros/jazzy/setup.bash
        source /vda_ws/install/setup.bash
        uv sync
        uv run python3 example_autoxing_adapter_client.py --disable-state-log
    depends_on:
      mqtt-broker:
        condition: service_started
      vda5050-real:
        condition: service_healthy
    networks:
      - rmf2-net
    environment:
      PYTHONUNBUFFERED: "1"
      # ROBOT_ID + MASTER_URL are the ONLY identity/config inputs; the adapter
      # resolves manufacturer/serial/endpoint/map/transform from the master.
      ROBOT_ID: autoxing-1
      MQTT_BROKER: tcp://mqtt-broker:${MQTT_PORT:-1883}
      MASTER_URL: http://vda5050:${VDA5050_PORT:-8000}
    restart: unless-stopped

  reeman-1-real:
    profiles: ["real-demo"]
    hostname: reeman-1
    build:
      context: .
      dockerfile: docker/vda5050.Dockerfile
    entrypoint: ["/bin/bash", "-lc"]
    working_dir: /vda_ws/src/vda5050_core_gametl/vda5050_core_py/demo-june-blue-ocean
    command:
      - |
        source /opt/ros/jazzy/setup.bash
        source /vda_ws/install/setup.bash
        uv sync
        uv run python3 example_reeman_adapter_client.py --disable-state-log
    depends_on:
      mqtt-broker:
        condition: service_started
      vda5050-real:
        condition: service_healthy
    networks:
      - rmf2-net
    environment:
      PYTHONUNBUFFERED: "1"
      # ROBOT_ID + MASTER_URL are the ONLY identity/config inputs; the adapter
      # resolves manufacturer/serial/endpoint/map/transform from the master.
      ROBOT_ID: reeman-1
      MQTT_BROKER: tcp://mqtt-broker:${MQTT_PORT:-1883}
      MASTER_URL: http://vda5050:${VDA5050_PORT:-8000}
    restart: unless-stopped

  # reeman-2-blue-real:
  #   profiles: ["real-demo"]
  #   hostname: reeman-2-blue
  #   build:
  #     context: .
  #     dockerfile: docker/vda5050.Dockerfile
  #   entrypoint: ["/bin/bash", "-lc"]
  #   working_dir: /vda_ws/src/vda5050_core_gametl/vda5050_core_py/demo-june-blue-ocean
  #   command:
  #     - |
  #       source /opt/ros/jazzy/setup.bash
  #       source /vda_ws/install/setup.bash
  #       uv sync
  #       uv run python3 example_reeman_adapter_client.py --disable-state-log
  #   depends_on:
  #     mqtt-broker:
  #       condition: service_started
  #     vda5050-real:
  #       condition: service_healthy
  #   networks:
  #     - rmf2-net
  #   environment:
  #     PYTHONUNBUFFERED: "1"
  #     # ROBOT_ID + MASTER_URL are the ONLY identity/config inputs; the adapter
  #     # resolves manufacturer/serial/endpoint/map/transform from the master.
  #     ROBOT_ID: reeman-2-blue
  #     MQTT_BROKER: tcp://mqtt-broker:${MQTT_PORT:-1883}
  #     MASTER_URL: http://vda5050:${VDA5050_PORT:-8000}
  #   restart: unless-stopped

  ui:
    build:
      context: src/rmf2-ui-gametl
      dockerfile: Dockerfile
      args:
        SCHEDULER_PORT: ${SCHEDULER_PORT:-8089}
        VDA5050_PORT: ${VDA5050_PORT:-8000}
        TASK_ORCHESTRATOR_PORT: ${TASK_ORCHESTRATOR_PORT:-2727}
        NGINX_PORT: ${NGINX_PORT:-80}
    image: rmf2-ui-dashboard:local
    ports:
      - "${UI_PORT:-3000}:${NGINX_PORT:-80}"
    depends_on:
      scheduler:
        condition: service_healthy
    networks:
      - rmf2-net
    restart: unless-stopped

networks:
  rmf2-net:
    driver: bridge
    name: rmf2_demo_gametl_rmf2-net
volumes:
  scheduler-data:
