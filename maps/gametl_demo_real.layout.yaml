# Canonical layout for the two-robot MAPF demo — REAL physical graph (ARTC site).
#
# SINGLE SOURCE OF TRUTH for the real map. The VDA5050 master loads this file
# and serves it over HTTP (/map metric, /map/grid planner view), replacing the
# old split between maps/gametl_demo_real.lif.yaml and
# demo-june-blue-ocean/gametl_demo_map.real.json (and the scheduler's bundled
# duplicate of the latter).
#
# Node ids are "col,row" grid strings: the planner derives its integer grid
# straight from the id (no separate `grid:` field). x/y are the real-world
# master-frame coordinates (AutoXing "From Mapping 40" map), hand-measured from
# the ARTC site sketch. `map.id` is the VDA5050 map_id robots must have loaded
# (the AutoXing onboard map name), NOT the planner label.
#
# Robot goals live in maps/robots.yaml (routes.real), NOT here. Real demo starts
# come from live localization (/state), not config.
#
# Shape: 7-node corridor, intersection at 3,1 with a 2-node branch below
# (3,0 then 2,-1), and the Reeman start stub 6,2 above the corridor's right
# end 6,1. No blocked edges — the real space has no shortcut to block.
#
# 
# Conflict story (same as the dry run): reeman crosses the intersection and
# passes through autoxing's goal 4,2 (was 3,0) on the way to 3,1 (was 2,-1).
#
# Planner grid ids use row +4 offset (min row >= 0) so CBS accepts all
# coordinates. Metric x/y are unchanged.

map:
  id: From Mapping 40
  version: 1.0-artc-sketch
  frame: From Mapping 40
