# Canonical layout for the two-robot MAPF demo — DRY-RUN graph.
#
# SINGLE SOURCE OF TRUTH for this map. The VDA5050 master loads this file and
# serves it to the whole stack over HTTP (/map metric, /map/grid planner view,
# replacing the old split between maps/gametl_demo.lif.yaml and
# demo-june-blue-ocean/gametl_demo_map.json).
#
# Node ids are "col,row" grid strings: the planner derives its integer grid
# straight from the id (no separate `grid:` field), while x/y are the metric
# (master-frame) coordinates the VDA5050 master dispatches against. For the
# dry-run map the metric coords are just the grid coords as metres.
#
# Robot start/goal live in maps/robots.yaml (routes.dry_run), NOT here — the
# layout is pure topology.
#
#   0,5 - 1,5 - 2,5 - 3,5 - 4,5 - 5,5 - 5,6
#                      |     :
#                     3,4 - 4,4
#
# Conflict story: reeman (5,6 -> 4,4) and autoxing (0,5 -> 3,4) contend for the
# shared 3,5 / 3,4 corridor; the 4,5->4,4 shortcut is blocked so reeman must
# route through it. CBS coordinates who goes first.

map:
  id: gametl_demo
  version: '1.0'
  frame: map
nodes:
  0,5:
    x: 0.0
    y: 1.0
    deviation: 0.25
  1,5:
    x: 1.0
    y: 1.0
    deviation: 0.25
  2,5:
    x: 2.0
    y: 1.0
    deviation: 0.25
  3,5:
    x: 3.0
    y: 1.0
    deviation: 0.25
  4,5:
    x: 4.0
    y: 1.0
    deviation: 0.25
  5,5:
    x: 5.0
    y: 1.0
    deviation: 0.25
  3,4:
    x: 3.0
    y: 0.0
    deviation: 0.25
  4,4:
    x: 4.0
    y: 0.0
    deviation: 0.25
  5,6:
    x: 5.0
    y: 2.0
    deviation: 0.25
edges:
- - 0,5
  - 1,5
- - 1,5
  - 2,5
- - 2,5
  - 3,5
- - 3,5
  - 4,5
- - 4,5
  - 5,5
- - 3,5
  - 3,4
- - 3,4
  - 4,4
- - 5,6
  - 5,5
blocked_edges:
- - 4,5
  - 4,4
