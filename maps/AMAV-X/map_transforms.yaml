# Map-frame transforms for the VDA5050 real demo (single source of truth).
# master_frame is the shared frame; each adapter entry (keyed by robot_id)
# is robot->master as a 2D similarity (theta radians, scale ~1.0). Regenerate:
#     cd maps && python -m map_transform.image_calibrate --map-id AMAV-X \
#         --master-map-dir autoxing-1_map --robot-map-dir reeman-2-blue_map [...]
# Consumed at adapter init when MAP_TF_MODE=file.
master_frame: AMAV-X
adapters:
  autoxing-1:
    map_name: AMAV-X
    robot_to_master:
      tx: 0.0
      ty: 0.0
      theta: 0.0
      scale: 1.0
  reeman-2-blue:
    map_name: Level3_1
    robot_to_master:
      tx: -0.6942
      ty: -0.6096
      theta: 3.12763
      scale: 1.0
    source: image-registration
    response: 0.2718
