# AMAV-X Level 3 — REAL physical graph (hand-measured from green overlay sketch).
#
# Canonical layout for VDA5050_MAP_ID=AMAV-X. Loaded by vda5050-real via
# MASTER_MAP_FILE=/app/maps/AMAV-X/real.layout.yaml (docker-compose.yml).
#
# Node ids are "col,row" grid strings: the planner derives its integer grid
# straight from the id (no separate `grid:` field). x/y are real-world metres
# in the AMAV-X master frame. `map.id` is the VDA5050 map_id robots must have
# loaded (the AutoXing onboard map name), NOT the planner label.
#
# Robot goals live in maps/robots.yaml (routes.real), NOT here. Real demo starts
# come from live localization (/state), not config.
#
# CBS rules: grid ids are uint >= 0; every edge differs by exactly ±1 in
# column OR row (4-connected). Metric x/y need not match grid row.
#
# Anchor mappings (fixed):
#   1,5  = [-10.0,  7.5]  left end of top corridor
#   3,2  = [ -2.0, -1.06]  west lower goal
#   3,1  = [ -1.51, -1.06]  midpoint between 3,2 and 4,1 (CBS hop)
#   4,1  = [ -1.02, -1.06]  orange-X marker
#
# CBS waypoints (unlabeled on sketch, required for ±1 grid hops):
#   3,5  = [ -3.0,  7.5]  top corridor between 2,5 and 4,5
#   5,7  = [  1.9, 20.0]  east trunk step between 5,6 and 5,8
#
# Shape: 19 nodes, 18 edges. No blocked edges.

