[project]
name = "res_mapf_planning"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Tan Chian Fern", email = "tan_chian_fern@a-star.edu.sg" }
]
requires-python = ">=3.10"
dependencies = [
    "lark>=1.3.1",
    "matplotlib>=3.10.7",
    "networkx<=3.5",
    "numpy<2.0.0",
    "pydantic>=2.12.5",
    "pytest>=9.0.1",
    "pyyaml>=6.0.3",
    "requests>=2.32.5",
    "shared-memory-dict>=0.7.2",
]

[build-system]
requires = ["uv_build>=0.9.13,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "types-pyyaml>=6.0.12.20260510",
]

[project.scripts]
res_mapf_planning_ros = "res_mapf_planning.ros2.main:main"
