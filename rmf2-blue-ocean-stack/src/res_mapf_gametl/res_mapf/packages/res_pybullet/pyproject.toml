[project]
name = "res_pybullet"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "res_mapf_planning",
    "numpy-quaternion>=2024.0.13",
    "pybullet>=3.2.7",
]

[tool.uv.sources]
res_mapf_planning = { workspace = true }

[project.scripts]
res_pybullet_sim = "res_pybullet.simulation.simulation:main"

[build-system]
requires = ["uv_build>=0.9.13,<0.10.0"]
build-backend = "uv_build"

[tool.uv.build]
packages = ["src/res_pybullet"]

include = [
    "src/res_pybullet/simulation/assets/**"
]